name: Deploy Riddim Africa Landing Page

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/riddimafrica-landing-page:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/riddimafrica-landing-page:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: "ec2-user"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            
            cd ~/riddimafrica-landing-page

            docker compose down

            docker compose  pull

            docker compose up -d
            docker system prune -af

